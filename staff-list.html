<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スタッフ一覧</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f8;
}

/* サイドバー（共通） */
.sidebar {
    width: 60px;
    height: 100vh;
    background: #1e1e2f;
    position: fixed;
    left: 0;
    top: 0;
    display: flex;
    justify-content: center;
    padding-top: 20px;
}

.menu {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.menu-item {
    width: 40px;
    height: 40px;
    background: #2c2c3e;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 10px;
    cursor: pointer;
}

.menu-item.active {
    background: #007BFF;
}

/* メイン */
.container {
    margin-left: 60px;
    padding: 20px;
}

/* カード */
.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
}

/* スタッフ一覧 */
.staff-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.staff-item {
    padding: 15px;
    background: #f0f0f0;
    border-radius: 8px;
}
</style>
</head>

<body>

<!-- サイドバー -->
<div class="sidebar">
    <div class="menu">
        <div class="menu-item" id="homeBtn">🏠</div>
        <div class="menu-item active">👤</div>
        <div class="menu-item" id="settingsWrap">
    ⚙️
    <div class="settings-panel" id="settingsPanel">
        <button onclick="logout()">ログアウト</button>
    </div>
</div>
    </div>
</div>

<div class="container">

<div class="card">
    <h3>スタッフ一覧</h3>

    <div class="staff-list">
        <div class="staff-item">スタッフA</div>
        <div class="staff-item">スタッフB</div>
        <div class="staff-item">スタッフC</div>
    </div>
</div>

</div>

<script>
// ホームへ戻る
document.getElementById("homeBtn").addEventListener("click", () => {
    window.location.href = "dashboard.html";
});

const wrap = document.getElementById("settingsWrap");
const panel = document.getElementById("settingsPanel");

wrap.addEventListener("click", (e) => {
    e.stopPropagation();
    panel.style.display = (panel.style.display === "block") ? "none" : "block";
});

document.addEventListener("click", () => {
    panel.style.display = "none";
});

// ログアウト
function logout(){
    localStorage.removeItem("role");
    window.location.href = "index.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DENTAL ERP | ログイン</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:    #07111f;
      --bg-card:    #0d2240;
      --accent:     #00c8d7;
      --accent2:    #0096b0;
      --text-main:  #e0eaf8;
      --text-muted: #6a8aaa;
      --text-label: #90aac8;
      --danger:     #e84040;
      --border:     #163050;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
      background: var(--bg-base);
      color: var(--text-main);
      font-size: 14px;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 20% 40%, rgba(0,150,176,.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 60%, rgba(0,200,215,.07) 0%, transparent 55%),
        #07111f;
    }

    /* Logo area */
    .login-logo {
      margin-bottom: 32px;
      text-align: center;
    }
    .login-logo-text {
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: .1em;
    }
    .login-logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      letter-spacing: .06em;
    }

    /* Card */
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 36px 40px 32px;
      width: 340px;
      max-width: calc(100vw - 32px);
      box-shadow: 0 8px 40px rgba(0,0,0,.45);
    }

    .login-card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: .04em;
      margin-bottom: 24px;
      text-align: center;
    }

    /* Form */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .form-label {
      font-size: 11px;
      color: var(--text-label);
      letter-spacing: .04em;
    }
    .form-input {
      background: #061020;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--text-main);
      font-family: inherit;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      width: 100%;
    }
    .form-input:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 2px rgba(0,200,215,.15);
    }
    .form-input::placeholder {
      color: #2a4060;
    }

    /* Error message */
    .login-error {
      display: none;
      font-size: 11.5px;
      color: var(--danger);
      background: rgba(232,64,64,.09);
      border: 1px solid rgba(232,64,64,.25);
      border-radius: 5px;
      padding: 8px 12px;
      margin-bottom: 14px;
      text-align: center;
    }
    .login-error.visible { display: block; }

    /* Submit button */
    .login-btn {
      width: 100%;
      background: var(--accent2);
      border: none;
      border-radius: 5px;
      padding: 11px;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      letter-spacing: .06em;
      transition: background .2s, box-shadow .2s;
      margin-top: 8px;
      font-family: inherit;
    }
    .login-btn:hover {
      background: var(--accent);
      box-shadow: 0 0 16px rgba(0,200,215,.35);
    }
    .login-btn:active {
      transform: translateY(1px);
    }

    /* Footer note */
    .login-footer {
      margin-top: 28px;
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: .03em;
    }

    /* Decorative top accent line */
    .login-card::before {
      content: '';
      display: block;
      height: 3px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 10px 10px 0 0;
      margin: -36px -40px 28px;
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
    }
  </style>
</head>
<body>

  <div class="login-logo">
    <div class="login-logo-text">DENTAL ERP</div>
    <div class="login-logo-sub">Dental Management System</div>
  </div>

  <div class="login-card">
    <div class="login-card-title">ログイン</div>

    <div class="form-group">
      <label class="form-label" for="login-id">ユーザーID</label>
      <input class="form-input" type="text" id="login-id" placeholder="IDを入力" autocomplete="username" />
    </div>

    <div class="form-group">
      <label class="form-label" for="login-pw">パスワード</label>
      <input class="form-input" type="password" id="login-pw" placeholder="パスワードを入力" autocomplete="current-password" />
    </div>

    <div class="login-error" id="login-error">IDまたはパスワードが正しくありません</div>

    <button class="login-btn" id="login-btn" onclick="doLogin()">ログイン</button>
  </div>

  <div class="login-footer">© 2026 DENTAL ERP System. All rights reserved.</div>

<script>
  // Enterキーでもログイン実行
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  function doLogin() {
    const id = document.getElementById('login-id').value.trim();
    const pw = document.getElementById('login-pw').value.trim();
    const err = document.getElementById('login-error');

    err.classList.remove('visible');

    if (id === 'president' && pw === 'president') {
      window.location.href = 'president.html';
    } else if (id === 'staff' && pw === 'staff') {
      window.location.href = 'staff.html';
    } else {
      err.classList.add('visible');
      document.getElementById('login-pw').value = '';
      document.getElementById('login-pw').focus();
    }
  }
</script>
</body>
</html>
